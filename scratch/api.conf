server {
    listen 80;
    server_name api.sanyogconformity.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.sanyogconformity.com;
    ssl_certificate /etc/letsencrypt/live/api.sanyogconformity.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.sanyogconformity.com/privkey.pem;

    # Allow large file uploads (up to 50MB)
    client_max_body_size 50M;

    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }
}
