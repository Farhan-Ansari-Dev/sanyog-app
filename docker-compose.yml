services:
  mongo:
    image: mongo:7
    container_name: sanyog-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sanyog-backend
    depends_on:
      - mongo
    ports:
      - "5000:5000"
    environment:
      PORT: "5000"
      MONGODB_URI: "mongodb://mongo:27017/sanyog"
      JWT_SECRET: "dev_change_me"
      JWT_EXPIRES_IN: "7d"
      CORS_ORIGIN: "http://localhost:5173"
      STORAGE_PROVIDER: "local"
      OTP_PROVIDER: "mock"
      OTP_TEST_CODE: "123456"
      ADMIN_JWT_EXPIRES_IN: "12h"
    volumes:
      - ./backend/uploads:/app/uploads

volumes:
  mongo_data:
