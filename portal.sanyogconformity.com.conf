# =======================================================
# SANYOG CONFORMITY - UNIFIED NGINX PRODUCTION CONFIG
# Environments: api, portal, admin
# =======================================================

# 1. API SERVER (Forwarding to PM2 / Node.js)
server {
    listen 80;
    server_name api.sanyogconformity.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.sanyogconformity.com;

    ssl_certificate /etc/letsencrypt/live/api.sanyogconformity.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.sanyogconformity.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        
        # WEBSOCKET / UPGRADE SUPPORT
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # CRITICAL CLOUDFLARE FORWARDING (Matched with Express `trust proxy 1`)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;

        proxy_cache_bypass $http_upgrade;
        
        # ALLOW LARGE FILE UPLOADS
        client_max_body_size 20M;
    }
}

# 2. CLIENT PORTAL (Serving static React build)
server {
    listen 80;
    server_name portal.sanyogconformity.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name portal.sanyogconformity.com;

    ssl_certificate /etc/letsencrypt/live/portal.sanyogconformity.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portal.sanyogconformity.com/privkey.pem;

    root /var/www/portal/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optimization: Cache static assets heavily
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires max;
        log_not_found off;
    }

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}

# 3. ADMIN PANEL (Serving static React build)
server {
    listen 80;
    server_name admin.sanyogconformity.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name admin.sanyogconformity.com;

    ssl_certificate /etc/letsencrypt/live/admin.sanyogconformity.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.sanyogconformity.com/privkey.pem;

    root /var/www/admin/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires max;
        log_not_found off;
    }

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
