server {
    listen 80;
    server_name portal.sanyogconformity.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name portal.sanyogconformity.com;

    ssl_certificate /etc/letsencrypt/live/portal.sanyogconformity.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portal.sanyogconformity.com/privkey.pem;

    root /var/www/portal;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
