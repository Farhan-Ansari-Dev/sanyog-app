services:
  mongo:
    image: mongo:7
    container_name: sanyog-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sanyog-backend
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "5000:5000"
    environment:
      PORT: "5000"
      MONGODB_URI: "mongodb://mongo:27017/sanyog"
      JWT_SECRET: "change_me_in_production"
      JWT_EXPIRES_IN: "7d"
      CORS_ORIGIN: "http://localhost:8080"
      OTP_PROVIDER: "mock"
      OTP_TEST_CODE: "123456"
      ADMIN_JWT_EXPIRES_IN: "12h"
      # For S3 uploads in production set STORAGE_PROVIDER=s3 and AWS_* credentials.
      STORAGE_PROVIDER: "local"
      # AWS_REGION: "ap-south-1"
      # AWS_BUCKET_NAME: "sanyogconformity-documents"
      # AWS_ACCESS_KEY_ID: "..."
      # AWS_SECRET_ACCESS_KEY: "..."
    volumes:
      - ./backend/uploads:/app/uploads

  admin:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "http://localhost:5000"
    container_name: sanyog-admin
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  mongo_data:
