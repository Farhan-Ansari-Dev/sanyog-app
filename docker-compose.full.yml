services:
  mongo:
    image: mongo:7
    container_name: sanyog-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sanyog-backend
    depends_on:
      - mongo
    ports:
      - "5000:5000"
    environment:
      PORT: "5000"
      MONGODB_URI: "mongodb://mongo:27017/sanyog"
      JWT_SECRET: "dev_change_me"
      JWT_EXPIRES_IN: "7d"
      CORS_ORIGIN: "http://localhost:5173"
      STORAGE_PROVIDER: "local"
      OTP_PROVIDER: "mock"
      OTP_TEST_CODE: "123456"
      ADMIN_JWT_EXPIRES_IN: "12h"
      # Seed an initial admin user on first run (set these locally or via env-file)
      # ADMIN_SEED_EMAIL: "admin@example.com"
      # ADMIN_SEED_PASSWORD: "change_me_please"
      # ADMIN_SEED_NAME: "Admin"
    volumes:
      - ./backend/uploads:/app/uploads

  admin:
    image: node:18-alpine
    container_name: sanyog-admin-dev
    working_dir: /app
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      # Used by Vite dev server code at runtime
      VITE_API_BASE_URL: "http://localhost:5000"
    volumes:
      - ./admin-panel:/app
      - admin_node_modules:/app/node_modules
    command: ["sh", "-lc", "npm install; npm run dev -- --host 0.0.0.0 --port 5173"]

volumes:
  mongo_data:
  admin_node_modules:
